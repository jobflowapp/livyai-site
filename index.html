<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livy AI — Your AI Life Admin Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #07080f;
    color: #e0dfff;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }
  .container {
    max-width: 600px;
    width: 100%;
    text-align: center;
  }
  .badge {
    display: inline-block;
    background: rgba(124,92,252,0.15);
    border: 1px solid rgba(124,92,252,0.3);
    color: #a78bfa;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 100px;
    margin-bottom: 24px;
  }
  h1 {
    font-size: 52px;
    font-weight: 700;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #fff, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
  }
  .description {
    font-size: 18px;
    color: rgba(240,239,255,0.6);
    max-width: 440px;
    margin: 0 auto 48px;
  }
  .privacy-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(124,92,252,0.12);
    border: 1px solid rgba(124,92,252,0.3);
    color: #a78bfa;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 22px;
    border-radius: 100px;
    text-decoration: none;
    transition: background 0.2s, border-color 0.2s;
  }
  .privacy-link:hover {
    background: rgba(124,92,252,0.22);
    border-color: rgba(124,92,252,0.5);
  }
  .footer {
    margin-top: 64px;
    font-size: 13px;
    color: rgba(240,239,255,0.25);
  }
</style>
</head>
<body>
<div class="container">
  <div class="badge">✦ Available on iOS</div>
  <h1>Livy AI</h1>
  <p class="description">Your AI-powered life admin assistant. Track subscriptions, bills, and deadlines — all in one place.</p>
  <a class="privacy-link" href="/privacy.html">Privacy Policy</a>
  <div class="footer">
    <p>© 2026 Livy AI · <a href="mailto:livyaibusiness@gmail.com" style="color:rgba(240,239,255,0.35);text-decoration:none;">livyaibusiness@gmail.com</a></p>
  </div>
</div>
</body>
</html>
